services:
  mongodb:
    image: mongo:latest
    container_name: omniquant_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - omniquant_network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: omniquant_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - omniquant_network
    restart: unless-stopped

  backend:
    platform: linux/arm64
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: omniquant_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - WHATSAPP_PHONE=${WHATSAPP_PHONE}
      - WHATSAPP_APIKEY=${WHATSAPP_APIKEY}
    depends_on:
      - mongodb
      - redis
    networks:
      - omniquant_network
    restart: unless-stopped

  celery_worker:
    platform: linux/arm64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omniquant_celery
    command: ["celery", "-A", "worker", "worker", "--loglevel=info"]
    environment:
      - MONGO_URL=mongodb://mongodb:27017/
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - WHATSAPP_PHONE=${WHATSAPP_PHONE}
      - WHATSAPP_APIKEY=${WHATSAPP_APIKEY}
    depends_on:
      - mongodb
      - redis
      - backend
    networks:
      - omniquant_network
    restart: unless-stopped

  celery_beat:
    platform: linux/arm64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omniquant_celery_beat
    command: ["celery", "-A", "worker", "beat", "--loglevel=info"]
    environment:
      - MONGO_URL=mongodb://mongodb:27017/
      - REDIS_URL=redis://redis:6379/0
      - WHATSAPP_PHONE=${WHATSAPP_PHONE}
      - WHATSAPP_APIKEY=${WHATSAPP_APIKEY}
    depends_on:
      - mongodb
      - redis
    networks:
      - omniquant_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omniquant_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - omniquant_network
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  omniquant_network:
    driver: bridge
